<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Player</title>
    <style>
      body {
        width: 260px;
        padding: 16px;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: #111827;
        color: #f9fafb;
      }

      h3 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      }

      button:hover {
        background: #1d4ed8;
      }

      .note {
        margin-top: 12px;
        font-size: 12px;
        color: #9ca3af;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h3>Mini Player</h3>
    <button id="open">เปิดหน้าต่างแยก</button>
    <p class="note">
      รองรับวิดีโอในแท็บปัจจุบัน<br />
      จดจำตำแหน่งเล่นสุดท้าย<br />
      ไม่เป็น Top Most โดยค่าเริ่มต้น
    </p>
    <script src="popup.js"></script>
  </body>
</html>
