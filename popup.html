<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Player</title>
    <style>
      /* Base styles */
      body {
        width: 260px;
        padding: 16px;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: #111827;
        color: #f9fafb;
      }

      /* Heading */
      h3 {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 600;
      }

      /* Button styles */
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: background-color 0.2s ease;
      }

      button:hover {
        background: #1d4ed8;
      }

      button:active {
        background: #1e40af;
      }

      /* Note text */
      .note {
        margin-top: 12px;
        font-size: 12px;
        color: #9ca3af;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h3>Mini Player</h3>
    <button id="open">Open Separate Window</button>
    <p class="note">
      Supports video in current tab<br />
      Remembers last playback position<br />
      Not topmost by default
    </p>
    <script src="popup.js"></script>
  </body>
</html>
